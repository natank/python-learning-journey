<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess the Number Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        
        .message {
            font-size: 1.3em;
            color: #333;
            margin: 20px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .gif-container {
            margin: 30px 0;
            min-height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .gif-container img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .form-container {
            margin-top: 30px;
        }
        
        form {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        input[type="number"] {
            padding: 15px 20px;
            font-size: 1.1em;
            border: 2px solid #667eea;
            border-radius: 10px;
            width: 200px;
            transition: all 0.3s ease;
        }
        
        input[type="number"]:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }
        
        button {
            padding: 15px 30px;
            font-size: 1.1em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            font-weight: bold;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .reset-link {
            margin-top: 20px;
            display: block;
            color: #667eea;
            text-decoration: none;
            font-size: 0.9em;
        }
        
        .reset-link:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 600px) {
            h1 {
                font-size: 2em;
            }
            
            .container {
                padding: 20px;
            }
            
            input[type="number"], button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Guess the Number</h1>
        
        <div class="message">
            {{ message }}
        </div>
        
        <div class="gif-container">
            <img src="{{ url_for('static', filename=gif_filename) }}" alt="Game feedback">
        </div>
        
        <div class="form-container">
            <form onsubmit="event.preventDefault(); window.location.href='/' + document.getElementById('guessInput').value;">
                <input 
                    type="number" 
                    id="guessInput"
                    name="guess" 
                    placeholder="Enter 1-100" 
                    min="1" 
                    max="100"
                    {% if guess %}value="{{ guess }}"{% endif %}
                    required
                    autofocus
                >
                <button type="submit">Submit Guess</button>
            </form>
            <a href="/" class="reset-link">Start New Game</a>
        </div>
    </div>
</body>
</html>
